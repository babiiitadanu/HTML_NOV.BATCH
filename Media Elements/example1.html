<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media elements</title>
    <link rel="shortcut icon" href="./music logo.jfif" type="image/x-icon">
</head>

<body>
    <main>
        <h1>MEDIA ELEMENTS</h1>
        <hr />
        <h2>AN IMAGE</h2>
        <img src="./Starboy-English-2016-500x500.jpg" alt="nature photo" width="700" height="500">
        <hr />


        <h2>AUDIO FILE</h2>
        <audio controls>
            <source src="./Lady Gaga, Bruno Mars - Die With A Smile (Official Music Video).mp3" type="audio/mpeg">
            <source src="./One Direction - Night Changes.mp3" type="audio/mpeg">
            <a>Your browser does not support the audio element.</a>
        </audio>
        <hr />


        <h2>VIDEO FILE</h2>
        <video controls autoplay width="700" height="500">
            <source src="./Lady Gaga, Bruno Mars - Die With A Smile (Official Music Video).mp4" type="video/mp4">
            <source src="./One Direction - Night Changes.mp4" type="video/mp4">
            <a>Your browser does not support the video tag.</a>
        </video>
        <hr />


        <h2>YOUTUBE VIDEO</h2>
        <iframe width="700" height="500" src="https://www.youtube.com/embed/Rek0NWPCNOc?start=80&controls=0"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
        <hr />


        <h2>MAP</h2>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d27686.631067819!2d79.76942599282849!3d29.840360640903505!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39a735cfcd2fa28f%3A0xf8feb865d64cab3e!2sBageshwar%2C%20Uttarakhand%20263642!5e0!3m2!1sen!2sin!4v1776405948455!5m2!1sen!2sin"
            width="700" height="500" style="border:0;" allowfullscreen loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
            <a>browser not supporting map for some reason</a>
        </iframe>
    </main>
</body>

</html>
